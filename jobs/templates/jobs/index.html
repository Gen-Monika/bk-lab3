{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JOB Log Backup Console</title>
    <style>
        :root {
            --page-bg: url("{% static 'hosts/visuals/bg/sunny_lighthouse.png' %}");
            --bg: #eef3f8;
            --panel: #ffffff;
            --ink: #1d2738;
            --muted: #667085;
            --line: #dce4ef;
            --accent: #2268f5;
            --accent-soft: #edf4ff;
            --success: #16845b;
            --danger: #ba2f3b;
            --shadow: 0 14px 36px rgba(32, 44, 72, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font: 14px/1.5 Arial, "Microsoft YaHei", sans-serif;
            background:
                linear-gradient(180deg, rgba(239, 246, 255, 0.58), rgba(243, 246, 249, 0.76)),
                var(--page-bg) center / cover fixed no-repeat;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.58;
        }

        .shell {
            max-width: 1280px;
            margin: 0 auto;
            padding: 22px;
        }

        .topbar,
        .panel {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(220, 228, 239, 0.95);
            border-radius: 8px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(4px);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 16px;
            padding: 14px 18px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            color: #fff;
            font-weight: 700;
            border-radius: 8px;
            background: linear-gradient(135deg, #2268f5, #10a37f);
        }

        .brand h1 {
            margin: 0;
            font-size: 18px;
            line-height: 1.2;
        }

        .brand p {
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 12px;
        }

        .status {
            color: var(--muted);
            min-height: 20px;
        }

        .status.error {
            color: var(--danger);
            font-weight: 700;
        }

        .segmented {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: rgba(237, 244, 255, 0.9);
            border: 1px solid rgba(204, 216, 236, 0.95);
            border-radius: 8px;
        }

        .segmented button {
            min-width: 84px;
            height: 30px;
            padding: 0 9px;
            color: #445066;
            background: transparent;
            border: 0;
            border-radius: 6px;
            white-space: nowrap;
        }

        .segmented button.active {
            color: #17345f;
            background: #fff;
            box-shadow: 0 2px 8px rgba(37, 52, 82, 0.12);
        }

        .grid {
            display: grid;
            grid-template-columns: 360px minmax(0, 1fr);
            gap: 16px;
            align-items: start;
        }

        .panel {
            padding: 16px;
        }

        .panel h2 {
            margin: 0 0 12px;
            font-size: 16px;
        }

        .panel-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .panel-title-row h2 {
            margin: 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            color: #4d596b;
            font-size: 12px;
            font-weight: 700;
        }

        .field input,
        .field select {
            width: 100%;
            height: 36px;
            padding: 0 10px;
            color: var(--ink);
            background: #fff;
            border: 1px solid #cbd6e4;
            border-radius: 6px;
            outline: none;
        }

        .field input:focus,
        .field select:focus {
            border-color: #72a2ff;
            box-shadow: 0 0 0 3px rgba(34, 104, 245, 0.12);
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .compact-actions {
            margin-top: 0;
            gap: 8px;
        }

        .btn-primary,
        .btn-ghost,
        .btn-link {
            height: 34px;
            padding: 0 12px;
            border-radius: 6px;
            border: 1px solid transparent;
        }

        .btn-primary {
            color: #fff;
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn-primary:disabled {
            background: #9bb8f2;
            border-color: #9bb8f2;
            cursor: wait;
        }

        .btn-ghost {
            color: #245fc7;
            background: #fff;
            border-color: #b9cae8;
        }

        .btn-link {
            height: 28px;
            color: #245fc7;
            background: var(--accent-soft);
            border-color: #cfddf8;
        }

        .btn-ghost:disabled,
        .btn-link:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .host-list {
            display: grid;
            gap: 8px;
            max-height: 250px;
            overflow: auto;
            padding: 4px;
            border: 1px solid #e1e8f2;
            border-radius: 6px;
            background: #f8fbff;
        }

        .host-row {
            display: grid;
            grid-template-columns: 20px 1fr;
            gap: 8px;
            align-items: center;
            padding: 7px;
            background: #fff;
            border: 1px solid #ebf0f6;
            border-radius: 6px;
        }

        .host-row strong,
        .host-row span {
            display: block;
            overflow-wrap: anywhere;
        }

        .host-row span {
            color: var(--muted);
            font-size: 12px;
        }

        .two-cols {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 640px;
            border-collapse: collapse;
            background: #fff;
        }

        tr.archived-record td {
            background: #fff8e6;
        }

        th,
        td {
            padding: 10px 9px;
            border-bottom: 1px solid #edf1f7;
            text-align: left;
            vertical-align: middle;
        }

        th {
            color: #526071;
            background: #f7f9fd;
            font-size: 12px;
            font-weight: 700;
        }

        td {
            color: #243044;
        }

        .empty {
            color: var(--muted);
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 8px;
            border-radius: 999px;
            color: #4b5a6d;
            background: #eef2f7;
            font-size: 12px;
        }

        .badge.success {
            color: var(--success);
            background: #e7f7f0;
        }

        .badge.error {
            color: var(--danger);
            background: #fdecef;
        }

        .results {
            display: grid;
            gap: 10px;
            max-height: 460px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .result-card {
            padding: 10px;
            background: #f8fbff;
            border: 1px solid #e1e8f2;
            border-radius: 6px;
        }

        .result-card.archived {
            background: #fff8e6;
            border-color: #f3d18c;
        }

        .result-card-header,
        .row-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .result-card-header {
            justify-content: space-between;
        }

        .selectable-heading {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .select-cell {
            width: 34px;
            text-align: center;
        }

        .result-card strong,
        .result-card span {
            display: block;
        }

        .result-card span {
            color: var(--muted);
            overflow-wrap: anywhere;
        }

        .pet-dock {
            position: fixed;
            left: 0;
            top: 0;
            width: 168px;
            z-index: 30;
            user-select: none;
            touch-action: none;
            will-change: transform;
        }

        .pet-body {
            display: block;
            width: 100%;
            height: 172px;
            object-fit: contain;
            object-position: bottom center;
            cursor: grab;
            filter: drop-shadow(0 14px 18px rgba(24, 32, 51, 0.22));
            -webkit-user-drag: none;
            user-drag: none;
        }

        .pet-body:active {
            cursor: grabbing;
        }

        .pet-controls {
            display: grid;
            grid-template-columns: 1fr 34px;
            gap: 6px;
            align-items: center;
            margin-top: 4px;
            padding: 6px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(214, 222, 235, 0.96);
            border-radius: 8px;
            box-shadow: 0 8px 18px rgba(32, 44, 72, 0.12);
            backdrop-filter: blur(8px);
        }

        .pet-select {
            width: 100%;
            height: 30px;
            padding: 0 6px;
            color: var(--ink);
            background: #fff;
            border: 1px solid #cbd6e4;
            border-radius: 6px;
            font-size: 12px;
        }

        .pet-reset {
            width: 30px;
            height: 30px;
            color: #42526a;
            background: #f5f8fc;
            border: 1px solid #d9e1ec;
            border-radius: 6px;
        }

        @media (max-width: 980px) {
            .grid,
            .two-cols {
                grid-template-columns: 1fr;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .topbar-right {
                justify-content: flex-start;
            }
        }

        @media (max-width: 640px) {
            .shell {
                padding: 14px;
            }

            .segmented {
                width: 100%;
                overflow-x: auto;
            }

            .segmented button {
                min-width: 80px;
            }

            .pet-dock {
                width: 138px;
            }

            .pet-body {
                height: 144px;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <div class="brand">
            <div class="brand-mark">JOB</div>
            <div>
                <h1>JOB Log Backup Console</h1>
                <p>BlueKing job plan execution and game host log backup</p>
            </div>
        </div>
        <div class="topbar-right">
            <div class="segmented" id="backgroundTools" aria-label="Background">
                <button class="active" type="button" data-bg="lighthouse">Lighthouse</button>
                <button type="button" data-bg="feather">Feather sky</button>
                <button type="button" data-bg="clubroom">Clubroom</button>
                <button type="button" data-bg="beach">Beach</button>
            </div>
            <div class="status" id="statusText"></div>
        </div>
    </header>

    <main class="grid">
        <section class="panel">
            <h2>Host Scope</h2>
            <div class="form-grid">
                <div class="field">
                    <label for="bizSelect">Business</label>
                    <select id="bizSelect"></select>
                </div>
                <div class="field">
                    <label for="hostNameInput">Host name</label>
                    <input id="hostNameInput" type="text" placeholder="optional">
                </div>
                <div class="field">
                    <label for="operatorInput">Operator</label>
                    <input id="operatorInput" type="text" placeholder="optional">
                </div>
            </div>
            <div class="actions">
                <button class="btn-primary" id="loadHostsBtn" type="button">Load Hosts</button>
                <button class="btn-ghost" id="reloadPlansBtn" type="button">Load Plans</button>
            </div>
            <div class="host-list" id="hostList" style="margin-top: 12px;"></div>
        </section>

        <div class="form-grid">
            <section class="panel">
                <h2>Job Plans</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Plan ID</th>
                                <th>Name</th>
                                <th>Creator</th>
                                <th>Updated</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="planTableBody"></tbody>
                    </table>
                </div>
            </section>

            <section class="two-cols">
                <div class="panel">
                    <h2>Search Logs</h2>
                    <div class="form-grid">
                        <div class="field">
                            <label for="searchPlanSelect">Search plan</label>
                            <select id="searchPlanSelect"></select>
                        </div>
                        <div class="field">
                            <label for="searchPathInput">Search path</label>
                            <input id="searchPathInput" type="text" value="/project">
                        </div>
                        <div class="field">
                            <label for="suffixInput">File suffix</label>
                            <input id="suffixInput" type="text" value="log">
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-primary" id="searchFilesBtn" type="button">Search Files</button>
                    </div>
                </div>

                <div class="panel">
                    <h2>Backup Logs</h2>
                    <div class="form-grid">
                        <div class="field">
                            <label for="backupPlanSelect">Backup plan</label>
                            <select id="backupPlanSelect"></select>
                        </div>
                        <div class="field">
                            <label for="backupPathInput">Backup path</label>
                            <input id="backupPathInput" type="text" value="/project/backup">
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-primary" id="backupFilesBtn" type="button">Backup Selected</button>
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-title-row">
                    <h2>File Results</h2>
                    <div class="actions compact-actions">
                        <button class="btn-ghost" id="toggleFileArchiveBtn" type="button">Show Archived</button>
                        <button class="btn-ghost" id="selectFileResultsBtn" type="button">Select</button>
                        <button class="btn-link" id="archiveSelectedFileResultsBtn" type="button">Archive Selected</button>
                        <button class="btn-link" id="restoreSelectedFileResultsBtn" type="button">Restore Selected</button>
                        <button class="btn-link" id="archiveFileResultsBtn" type="button">Archive All</button>
                        <button class="btn-link" id="restoreFileResultsBtn" type="button">Restore All</button>
                    </div>
                </div>
                <div class="results" id="fileResults"></div>
            </section>

            <section class="panel">
                <div class="panel-title-row">
                    <h2>Execution Records</h2>
                    <div class="actions compact-actions">
                        <button class="btn-ghost" id="toggleRecordArchiveBtn" type="button">Show Archived</button>
                        <button class="btn-ghost" id="selectRecordsBtn" type="button">Select</button>
                        <button class="btn-link" id="archiveSelectedRecordsBtn" type="button">Archive Selected</button>
                        <button class="btn-link" id="restoreSelectedRecordsBtn" type="button">Restore Selected</button>
                        <button class="btn-link" id="archiveRecordsBtn" type="button">Archive All</button>
                        <button class="btn-link" id="restoreRecordsBtn" type="button">Restore All</button>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th class="select-cell record-selection-column">Select</th>
                                <th>Time</th>
                                <th>Action</th>
                                <th>Instance</th>
                                <th>Status</th>
                                <th>Hosts</th>
                                <th>Summary</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="recordTableBody"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
</div>

<aside class="pet-dock" id="petDock" aria-label="Desktop pet">
    <img class="pet-body" id="petBody" src="{% static 'hosts/visuals/pets/noa.png' %}" alt="Noa" draggable="false">
    <div class="pet-controls">
        <select class="pet-select" id="petSelect" aria-label="Pet">
            <option value="noa">Noa</option>
            <option value="amane">Amane</option>
            <option value="kurumi">Kurumi</option>
            <option value="kaguya">Kaguya</option>
            <option value="orie">Orie</option>
        </select>
        <button class="pet-reset" id="petReset" type="button" title="Reset position">R</button>
    </div>
</aside>

<script>
const endpoints = {
    businesses: "{% url 'jobs:businesses' %}",
    hosts: "{% url 'jobs:hosts' %}",
    plans: "{% url 'jobs:plans' %}",
    searchFiles: "{% url 'jobs:search_files' %}",
    backupFiles: "{% url 'jobs:backup_files' %}",
    records: "{% url 'jobs:records' %}",
};

const visualAssets = {
    backgrounds: {
        lighthouse: "{% static 'hosts/visuals/bg/sunny_lighthouse.png' %}",
        feather: "{% static 'hosts/visuals/bg/feather_sky.png' %}",
        clubroom: "{% static 'hosts/visuals/bg/clubroom.png' %}",
        beach: "{% static 'hosts/visuals/bg/beach.png' %}",
    },
    pets: {
        noa: "{% static 'hosts/visuals/pets/noa.png' %}",
        amane: "{% static 'hosts/visuals/pets/amane.png' %}",
        kurumi: "{% static 'hosts/visuals/pets/kurumi.png' %}",
        kaguya: "{% static 'hosts/visuals/pets/kaguya.png' %}",
        orie: "{% static 'hosts/visuals/pets/orie.png' %}",
    },
};

const state = {
    businesses: [],
    hosts: [],
    plans: [],
    records: [],
    fileResults: [],
    showArchivedFileResults: false,
    showArchivedRecords: false,
    fileSelectionMode: false,
    recordSelectionMode: false,
};

const ACTIVE_STATUS_CODES = new Set([1, 2, 7, 8, 9, 10, 12]);
const TERMINAL_STATUS_CODES = new Set([3, 4, 5, 6, 11, 13]);
const ACTIVE_STATUS_TEXTS = new Set([
    "not started",
    "running",
    "waiting",
    "forced",
    "state abnormal",
    "stopping",
    "queueing",
]);
const RECORD_REFRESH_INTERVAL_MS = 8000;
let recordRefreshTimer = null;
let recordsRefreshing = false;
const archiveStoragePrefix = `jobConsole:${window.location.pathname.split("/").filter(Boolean)[0] || "local"}`;
const archivedFileResultKeys = loadStoredSet(`${archiveStoragePrefix}:archivedFileResults`);
const archivedRecordIds = loadStoredSet(`${archiveStoragePrefix}:archivedRecords`);
const selectedFileResultKeys = new Set();
const selectedRecordIds = new Set();

function setStatus(message, tone) {
    const el = document.getElementById("statusText");
    el.textContent = message || "";
    el.className = tone === "error" ? "status error" : "status";
}

function setBusy(id, busy) {
    document.getElementById(id).disabled = busy;
}

function loadStoredSet(key) {
    try {
        const value = JSON.parse(window.localStorage.getItem(key) || "[]");
        return new Set(Array.isArray(value) ? value.map(String) : []);
    } catch (error) {
        return new Set();
    }
}

function saveStoredSet(key, set) {
    window.localStorage.setItem(key, JSON.stringify(Array.from(set)));
}

function csrfToken() {
    const match = document.cookie.match(/(?:^|; )csrftoken=([^;]+)/);
    return match ? decodeURIComponent(match[1]) : "";
}

async function requestJson(url, options = {}) {
    const response = await fetch(url, {
        credentials: "same-origin",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken(),
            ...(options.headers || {}),
        },
        ...options,
    });
    const contentType = response.headers.get("content-type") || "";
    if (!contentType.includes("application/json")) {
        throw new Error(`Unexpected response ${response.status}`);
    }
    const payload = await response.json();
    if (!response.ok || !payload.result) {
        throw new Error(payload.message || `Request failed with ${response.status}`);
    }
    return payload.data;
}

function fillSelect(id, rows, valueKey, textKey, placeholder) {
    const select = document.getElementById(id);
    select.innerHTML = "";
    const option = document.createElement("option");
    option.value = "";
    option.textContent = placeholder;
    select.appendChild(option);
    rows.forEach((row) => {
        const item = document.createElement("option");
        item.value = row[valueKey];
        item.textContent = row[textKey];
        select.appendChild(item);
    });
}

async function loadBusinesses() {
    try {
        setStatus("Loading businesses...");
        state.businesses = await requestJson(endpoints.businesses);
        fillSelect("bizSelect", state.businesses, "bk_biz_id", "bk_biz_name", "Select business");
        setStatus("");
    } catch (error) {
        setStatus(error.message, "error");
    }
}

async function loadHosts() {
    const bizId = document.getElementById("bizSelect").value;
    if (!bizId) {
        setStatus("Select a business first");
        return;
    }
    const params = new URLSearchParams({ bk_biz_id: bizId });
    const hostName = document.getElementById("hostNameInput").value.trim();
    const operator = document.getElementById("operatorInput").value.trim();
    if (hostName) params.set("bk_host_name", hostName);
    if (operator) params.set("operator", operator);
    setBusy("loadHostsBtn", true);
    try {
        setStatus("Loading hosts...");
        state.hosts = await requestJson(`${endpoints.hosts}?${params.toString()}`);
        renderHosts();
        setStatus(`${state.hosts.length} hosts loaded`);
    } catch (error) {
        state.hosts = [];
        renderHosts();
        setStatus(error.message, "error");
    } finally {
        setBusy("loadHostsBtn", false);
    }
}

function renderHosts() {
    const box = document.getElementById("hostList");
    box.innerHTML = "";
    if (!state.hosts.length) {
        box.innerHTML = '<div class="empty">No hosts loaded</div>';
        return;
    }
    state.hosts.forEach((host) => {
        const label = document.createElement("label");
        label.className = "host-row";
        label.innerHTML = `
            <input type="checkbox" value="${escapeHtml(host.bk_host_id || "")}">
            <span>
                <strong>${escapeHtml(host.bk_host_name || host.bk_host_innerip || "Unnamed host")}</strong>
                <span>${escapeHtml(host.bk_host_innerip || "")} / ${escapeHtml(host.operator || "")}</span>
            </span>
        `;
        box.appendChild(label);
    });
}

async function loadPlans() {
    const bizId = document.getElementById("bizSelect").value;
    if (!bizId) {
        setStatus("Select a business first");
        return;
    }
    setBusy("reloadPlansBtn", true);
    try {
        setStatus("Loading job plans...");
        state.plans = await requestJson(`${endpoints.plans}?bk_biz_id=${encodeURIComponent(bizId)}`);
        renderPlans();
        fillPlanSelects();
        setStatus(`${state.plans.length} plans loaded`);
    } catch (error) {
        state.plans = [];
        renderPlans();
        fillPlanSelects();
        setStatus(error.message, "error");
    } finally {
        setBusy("reloadPlansBtn", false);
    }
}

function renderPlans() {
    const tbody = document.getElementById("planTableBody");
    tbody.innerHTML = "";
    if (!state.plans.length) {

        job_instance_id: record ? record.job_instance_id : row.job_instance_id,

}

function fileResultKey(row) {
    return encodeURIComponent(JSON.stringify([
        row.record_id || "",
        row.bk_host_id || "",
        row.bk_file_list || row.log_content || row.message || "",
        row.bk_file_cnt ?? "",
        row.bk_file_total_size ?? "",
    ]));
}

function renderFileResults(rows) {
    if (Array.isArray(rows)) {
        state.fileResults = rows.map((row) => ({
            ...row,
            archive_key: row.archive_key || fileResultKey(row),
        }));
    }
    const box = document.getElementById("fileResults");
    box.innerHTML = "";
    if (!state.fileResults.length) {
        box.innerHTML = '<div class="empty">No file result returned yet</div>';
        updateArchiveControls();
        return;
    }
    const visibleRows = state.fileResults.filter((row) => (
        state.showArchivedFileResults || !archivedFileResultKeys.has(row.archive_key)
    ));
    if (!visibleRows.length) {
        box.innerHTML = '<div class="empty">All file results are archived. Use Show Archived to review them.</div>';
        updateArchiveControls();
        return;
    }
    visibleRows.forEach((row) => {
        const card = document.createElement("div");
        const archived = archivedFileResultKeys.has(row.archive_key);
        card.className = archived ? "result-card archived" : "result-card";
        const selected = selectedFileResultKeys.has(row.archive_key);
        const titleHtml = state.fileSelectionMode
            ? `<label class="selectable-heading"><input type="checkbox" data-file-select="${escapeHtml(row.archive_key)}" ${selected ? "checked" : ""}> <strong>Host ${escapeHtml(row.bk_host_id || "")}</strong></label>`
            : `<strong>Host ${escapeHtml(row.bk_host_id || "")}</strong>`;
        const actionHtml = state.fileSelectionMode
            ? ""
            : `<button class="btn-link" type="button" data-file-result="${escapeHtml(row.archive_key)}">${archived ? "Restore" : "Archive"}</button>`;
        const fileText = row.bk_file_list || row.log_content || row.message || "";
        const fileLabel = row.message && !row.bk_file_list && !row.log_content ? "Summary" : "Files";
        const countLine = row.bk_file_cnt !== "" && row.bk_file_cnt !== null && row.bk_file_cnt !== undefined
            ? `<span>Count: ${escapeHtml(row.bk_file_cnt)}</span>`
            : "";
        const sizeLine = row.bk_file_total_size !== "" && row.bk_file_total_size !== null && row.bk_file_total_size !== undefined
            ? `<span>Total size: ${escapeHtml(row.bk_file_total_size)}</span>`
            : "";
        card.innerHTML = `
            <div class="result-card-header">
                ${titleHtml}
                ${actionHtml}
            </div>
            ${fileText ? `<span>${fileLabel}: ${escapeHtml(fileText)}</span>` : ""}
            ${countLine}
            ${sizeLine}
        `;
        box.appendChild(card);

}

async function loadRecords(options = {}) {

        state.records = await requestJson(endpoints.records);
        renderRecords();
        renderStoredFileResults();
        updateRecordAutoRefresh();
        if (options.refreshActive) {
            await refreshActiveRecords({ silent: true });
        }
    } catch (error) {
        setStatus(error.message, "error");
    }
}

function isActiveRecord(record) {
    const status = Number(record.status);
    if (TERMINAL_STATUS_CODES.has(status)) {
        return false;
    }
    if (ACTIVE_STATUS_CODES.has(status)) {
        return true;
    }
    return ACTIVE_STATUS_TEXTS.has(String(record.status_text || "").toLowerCase());
}

function getStatusTone(record) {
    const status = Number(record.status);
    const statusText = String(record.status_text || "").toLowerCase();
    if (status === 3 || statusText === "success") {
        return "success";
    }
    if ([4, 9, 10, 11, 13].includes(status) || ["failed", "state abnormal", "stopping", "terminated"].includes(statusText)) {
        return "error";
    }
    return "";
}

function updateRecordAutoRefresh() {
    const hasActiveRecord = state.records.some(isActiveRecord);
    if (hasActiveRecord && !recordRefreshTimer) {
        recordRefreshTimer = window.setInterval(() => {
            refreshActiveRecords({ silent: true });
        }, RECORD_REFRESH_INTERVAL_MS);
    }
    if (!hasActiveRecord && recordRefreshTimer) {
        window.clearInterval(recordRefreshTimer);
        recordRefreshTimer = null;
    }
}

    try {
        setStatus("Refreshing status...");
        const data = await requestJson(`${endpoints.records}${recordId}/refresh/`, {
            method: "POST",
            body: "{}",
        });
        if (data.logs && data.logs.length) {
            renderFileResults(withRecordContext(data.logs, data.record));
        }
        await loadRecords();
        setStatus("");
    } catch (error) {
        setStatus(error.message, "error");
    }
}

async function refreshActiveRecords(options = {}) {
    if (recordsRefreshing || document.hidden) {
        return;
    }
    const activeRecords = state.records.filter(isActiveRecord);
    if (!activeRecords.length) {
        updateRecordAutoRefresh();
        return;
    }
    recordsRefreshing = true;
    try {
        if (!options.silent) {
            setStatus("Refreshing active job records...");
        }
        let latestLogs = [];
        for (const record of activeRecords) {
            const data = await requestJson(`${endpoints.records}${record.id}/refresh/`, {
                method: "POST",
                body: "{}",
            });
            if (data.logs && data.logs.length) {
                latestLogs = withRecordContext(data.logs, data.record);
            }
        }
        if (latestLogs.length) {
            renderFileResults(latestLogs);
        }
        await loadRecords();
        if (!options.silent) {
            setStatus("");
        }
    } catch (error) {
        setStatus(error.message, "error");
    } finally {
        recordsRefreshing = false;
    }
}

function initPet() {
    const dock = document.getElementById("petDock");
    const body = document.getElementById("petBody");
    const select = document.getElementById("petSelect");
    const reset = document.getElementById("petReset");
    const savedPet = window.localStorage.getItem("jobConsolePet") || "noa";
    const state = {
        x: 0,
        y: 0,
        velocityY: 0,
        dragging: false,
        dragOffsetX: 0,
        dragOffsetY: 0,
        lastTime: performance.now(),
    };

    function size() {
        return {
            width: dock.offsetWidth || 168,
            height: dock.offsetHeight || 220,
        };
    }

    function floorY() {
        return Math.max(12, window.innerHeight - size().height - 18);
    }

    function clampPosition() {
        const box = size();
        state.x = Math.min(Math.max(10, state.x), Math.max(10, window.innerWidth - box.width - 10));
        state.y = Math.min(Math.max(10, state.y), floorY());
    }

    function resetPosition() {
        const box = size();
        state.x = Math.max(10, window.innerWidth - box.width - 28);
        state.y = floorY();
        state.velocityY = 0;
        render(performance.now());
    }

    function setPet(name) {
        const selected = visualAssets.pets[name] ? name : "noa";
        body.src = visualAssets.pets[selected];
        body.alt = selected.charAt(0).toUpperCase() + selected.slice(1);
        select.value = selected;
        window.localStorage.setItem("jobConsolePet", selected);
    }

    function render(time) {
        const bob = state.dragging ? 0 : Math.sin(time / 640) * 4;
        const sway = state.dragging ? 0 : Math.sin(time / 1200) * 3;
        dock.style.transform = `translate3d(${state.x + sway}px, ${state.y + bob}px, 0)`;
    }

    function animate(time) {
        const delta = Math.min(32, time - state.lastTime);
        state.lastTime = time;
        if (!state.dragging) {
            const floor = floorY();
            if (state.y < floor || state.velocityY > 0.01) {
                state.velocityY += 0.0024 * delta;
                state.y += state.velocityY * delta;
                if (state.y > floor) {
                    state.y = floor;
                    state.velocityY = 0;
                }
            }
            clampPosition();
        }
        render(time);
        window.requestAnimationFrame(animate);
    }

    body.addEventListener("dragstart", (event) => {
        event.preventDefault();
    });

    body.addEventListener("pointerdown", (event) => {
        if (!event.isPrimary) return;
        event.preventDefault();
        state.dragging = true;
        state.velocityY = 0;
        state.dragOffsetX = event.clientX - state.x;
        state.dragOffsetY = event.clientY - state.y;
        body.setPointerCapture(event.pointerId);
    });

    body.addEventListener("pointermove", (event) => {
        if (!state.dragging) return;
        state.x = event.clientX - state.dragOffsetX;
        state.y = event.clientY - state.dragOffsetY;
        clampPosition();
        render(performance.now());
    });

    body.addEventListener("pointerup", (event) => {
        state.dragging = false;
        state.velocityY = 0;
        body.releasePointerCapture(event.pointerId);
    });

    body.addEventListener("pointercancel", () => {
        state.dragging = false;
    });

    select.addEventListener("change", () => setPet(select.value));
    reset.addEventListener("click", resetPosition);
    document.addEventListener("keydown", (event) => {
        if (event.key.toLowerCase() === "r" && !event.ctrlKey && !event.altKey && !event.metaKey) {
            const tagName = document.activeElement ? document.activeElement.tagName : "";
            if (!["INPUT", "SELECT", "TEXTAREA"].includes(tagName)) {
                resetPosition();
            }
        }
    });
    window.addEventListener("resize", resetPosition);
    setPet(savedPet);
    window.setTimeout(resetPosition, 50);
    window.requestAnimationFrame(animate);
}

    fillPlanSelects();
});

});

renderRecords();
